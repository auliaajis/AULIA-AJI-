<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Informasi BK SMP N 2 Susukan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Safe Storage Polyfill for Google Apps Script Sandbox & iframe environments
      (() => {
        var testKey = '__storage_test__';
        var storageSupported = false;
        try {
          if (typeof window !== 'undefined' && window.localStorage) {
            window.localStorage.setItem(testKey, testKey);
            window.localStorage.removeItem(testKey);
            storageSupported = true;
          }
        } catch (e) {
          storageSupported = false;
        }

        if (!storageSupported) {
          console.warn('localStorage is blocked or unsupported (likely inside a Google Apps Script sandbox). Polyfilling in-memory localStorage and sessionStorage...');
          
          var createMockStorage = function() {
            var store = {};
            return {
              getItem: function(key) { 
                return key in store ? store[key] : null; 
              },
              setItem: function(key, value) { 
                store[key] = String(value); 
              },
              removeItem: function(key) { 
                delete store[key]; 
              },
              clear: function() { 
                store = {}; 
              },
              key: function(index) { 
                return Object.keys(store)[index] || null; 
              },
              get length() { 
                return Object.keys(store).length; 
              }
            };
          };

          try {
            Object.defineProperty(window, 'localStorage', {
              value: createMockStorage(),
              configurable: true,
              enumerable: true,
              writable: true
            });
          } catch (e) {
            window.localStorage = createMockStorage();
          }

          try {
            Object.defineProperty(window, 'sessionStorage', {
              value: createMockStorage(),
              configurable: true,
              enumerable: true,
              writable: true
            });
          } catch (e) {
            window.sessionStorage = createMockStorage();
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
